server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=passenger-service
spring.cloud.gateway.routes[0].uri=lb://PASSENGER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/passenger/**

spring.cloud.gateway.routes[1].id=carrentals-service
spring.cloud.gateway.routes[1].uri=lb://CARRRENTALS-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/cars/**

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans